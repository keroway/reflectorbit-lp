version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    labels:
      - infra
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      astro:
        patterns:
          - 'astro'
          - '@astrojs/*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      biome:
        patterns:
          - '@biomejs/*'
    # NOTE: vite の override (^7.3.5 固定) は Astro 7 移行で撤去済み。
    # Astro 7 以降は Astro 同梱の Vite v8 をそのまま使う (CLAUDE.md の
    # 「ビルド時の落とし穴」を参照)。dependabot が vite / astro の major
    # 更新 PR を出した場合は同節を必ず手動で確認すること。

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    labels:
      - infra
    commit-message:
      prefix: chore(ci)
      include: scope
