# pnpm 11 はデフォルトで依存の build スクリプト実行を遮断する (strictDepBuilds)。
# lefthook の postinstall は git hooks のインストールのため許可する。
# それ以外 (esbuild / sharp / hyperframes 経由の onnxruntime-node 等) は
# prebuilt バイナリで動作するため build スクリプト実行は不要 (明示的に拒否)。
allowBuilds:
  lefthook: true
  esbuild: false
  sharp: false
  "@google/genai": false
  onnxruntime-node: false
  protobufjs: false

# svgo は astro の transitive dependency (astro@7.1.3 は `svgo: ^4.0.1` を要求)。
# svgo 4.0.1 に既知の脆弱性修正 (fast-uri 巻き添え更新含む) があるため 4.0.2 に固定する。
overrides:
  svgo: ^4.0.2
