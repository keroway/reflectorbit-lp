# pnpm 11 はデフォルトで依存の build スクリプト実行を遮断する (strictDepBuilds)。
# lefthook の postinstall は git hooks のインストールのため許可する。
# それ以外 (esbuild / sharp / hyperframes 経由の onnxruntime-node 等) は
# prebuilt バイナリで動作するため build スクリプト実行は不要 (明示的に拒否)。
allowBuilds:
  lefthook: true
  esbuild: false
  sharp: false
  "@google/genai": false
  onnxruntime-node: false
  protobufjs: false

# svgo は astro の transitive dependency (astro@7.1.3 は `svgo: ^4.0.1` を要求)。
# svgo 4.0.1 に既知の脆弱性修正 (fast-uri 巻き添え更新含む) があるため 4.0.2 に固定する。
#
# 以下は hyperframes / @astrojs/check 経由の transitive dependency に対する
# Dependabot alert 対応 (いずれも devDependencies 側で、ビルド成果物には含まれない)。
# - fast-uri: @astrojs/check > @astrojs/language-server 経由の ajv が要求する古い版
#   (GHSA-v2hh-gcrm-f6hx / GHSA-4c8g-83qw-93j6)
# - sharp: hyperframes が要求する古い版 (GHSA-f88m-g3jw-g9cj)。ルートの
#   devDependencies sharp (^0.35.2) と揃えて重複バージョンを解消する
# - adm-zip: hyperframes / onnxruntime-node が要求する古い版 (GHSA-xcpc-8h2w-3j85)
# - @hono/node-server: hyperframes が要求する古い版 (Windows 限定の path traversal)
#
# NOTE: pnpm-workspace.yaml の overrides と package.json の pnpm.overrides は
# 併用すると後者が無視される (pnpm-workspace.yaml 側が優先されマージされない)。
# override はこのファイルに一本化すること。yaml は元々 package.json 側にあった
# @astrojs/check > yaml-language-server 経由の脆弱版 (GHSA-48c2-rrv3-qjmp) 対応。
overrides:
  svgo: ^4.0.2
  fast-uri: ^4.1.1
  sharp: ^0.35.3
  adm-zip: ^0.6.0
  "@hono/node-server": ^2.0.11
  yaml: ^2.8.3
