<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="REFLECTORBIT — 2 キーで操る軌道反射アクション">
  <!--
    OGP / Twitter Card 用デザインソース。
    配色は docs/design.md（出所: ゲーム本体 src/constants.zig）に準拠。
    PNG 版 (og-default.png) は scripts/gen-og.mjs で書き出す。
  -->
  <defs>
    <radialGradient id="bgGlowCore" cx="22%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#33e6ff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#33e6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlowShield" cx="85%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#ff33cc" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff33cc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e6faff"/>
      <stop offset="55%" stop-color="#33e6ff"/>
      <stop offset="100%" stop-color="#33e6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ベース背景 -->
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect width="1200" height="630" fill="url(#bgGlowCore)"/>
  <rect width="1200" height="630" fill="url(#bgGlowShield)"/>

  <!-- 右側: 反射ビジュアル (Core + 軌道リング + Shield + Meteor) -->
  <g transform="translate(900 315)">
    <!-- 軌道リング (外側) -->
    <circle r="220" fill="none" stroke="#33e6ff" stroke-opacity="0.18" stroke-width="2"/>
    <circle r="170" fill="none" stroke="#33e6ff" stroke-opacity="0.28" stroke-width="2" stroke-dasharray="2 8"/>
    <!-- Core 本体 -->
    <circle r="60" fill="url(#coreFill)"/>
    <circle r="36" fill="#33e6ff"/>
    <!-- Shield (マゼンタ円弧) -->
    <path d="M 0 -170 A 170 170 0 0 1 120.21 -120.21" fill="none" stroke="#ff33cc" stroke-width="14" stroke-linecap="round" opacity="0.95"/>
    <!-- Shield グロー -->
    <path d="M 0 -170 A 170 170 0 0 1 120.21 -120.21" fill="none" stroke="#ff33cc" stroke-width="28" stroke-linecap="round" opacity="0.25"/>
    <!-- Meteor (オレンジ・反射軌跡) -->
    <circle cx="-260" cy="-180" r="14" fill="#ff801a"/>
    <line x1="-260" y1="-180" x2="-130" y2="-90" stroke="#ff801a" stroke-width="3" stroke-opacity="0.55"/>
    <!-- 反射後の軌跡 (Shieldで弾かれた先) -->
    <line x1="60" y1="-152" x2="280" y2="-280" stroke="#ffe61a" stroke-width="3" stroke-opacity="0.7" stroke-dasharray="6 6"/>
    <circle cx="280" cy="-280" r="10" fill="#ffe61a"/>
    <!-- Spawner (赤) -->
    <g transform="translate(300 -300)">
      <rect x="-18" y="-18" width="36" height="36" fill="none" stroke="#e63333" stroke-width="3" transform="rotate(45)"/>
    </g>
    <!-- パーティクル -->
    <circle cx="-40" cy="80" r="4" fill="#ffcc4d" opacity="0.8"/>
    <circle cx="90" cy="120" r="3" fill="#ffcc4d" opacity="0.6"/>
    <circle cx="-110" cy="-30" r="3" fill="#ffcc4d" opacity="0.5"/>
  </g>

  <!-- 左側: テキスト -->
  <g transform="translate(80 0)">
    <!-- eyebrow -->
    <text x="0" y="195" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="22" letter-spacing="8" fill="#33e6ff" font-weight="600">REFLECT × ORBIT</text>
    <!-- title -->
    <text x="0" y="290" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="92" letter-spacing="6" fill="#33e6ff" font-weight="800">REFLECTORBIT</text>
    <!-- catch -->
    <text x="0" y="370" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="48" fill="#ff33cc" font-weight="700">弾くな、撃ち返せ。</text>
    <!-- sub -->
    <text x="0" y="430" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="28" fill="#cccccc" font-weight="500">2 キーで操る、軌道反射アクション。</text>
    <!-- url -->
    <text x="0" y="540" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="22" letter-spacing="2" fill="#cccccc" fill-opacity="0.7">reflectorbit.pages.dev</text>
  </g>

  <!-- 上下のネオン罫線 (ごく薄く) -->
  <rect x="0" y="0" width="1200" height="3" fill="#33e6ff" fill-opacity="0.5"/>
  <rect x="0" y="627" width="1200" height="3" fill="#ff33cc" fill-opacity="0.5"/>
</svg>
